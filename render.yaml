services:
  - type: web
    name: restaurant-rag-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_DAILY_REQUESTS_PER_IP
        value: "40"
